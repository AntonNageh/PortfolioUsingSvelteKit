<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Anton Nageh - Front-end Developer</title>
		<meta name="description" content="Front-end Developer specializing in React, SvelteKit, and modern web technologies. Building performant, accessible web applications."/>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="theme-color" content="#8b5cf6"/>
		
		<!-- Preconnect -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		
		<!-- Fonts -->
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
		
		<!-- Icons -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" integrity="sha512-z3gLpd7yknf1YoNbCzqRKc4qyor8gaKU1qmn+CShxbuBusANI9QpRohGBreCFkKxLhei6S9CQXFEbbKuqLg0DA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
		
		<!-- PWA -->
		<link rel="manifest" href="/manifest.webmanifest">
		<link rel="icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">  
		<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">  
		<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
		
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="bg-slate-950 text-white antialiased">
		<div style="display: contents">%sveltekit.body%</div>
		
		<!-- Subtle background gradient -->
		<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">
			<div class="absolute top-0 left-1/4 w-96 h-96 bg-violet-600/10 rounded-full blur-3xl"></div>
			<div class="absolute bottom-0 right-1/4 w-96 h-96 bg-purple-600/10 rounded-full blur-3xl"></div>
		</div>
		
		<!-- Scroll reveal -->
		<script>
			if (window.matchMedia('(prefers-reduced-motion: no-preference)').matches) {
				const observer = new IntersectionObserver((entries) => {
					entries.forEach(entry => {
						if (entry.isIntersecting) {
							entry.target.classList.add('active');
						}
					});
				}, {
					threshold: 0.15,
					rootMargin: '0px 0px -50px 0px'
				});

				document.addEventListener('DOMContentLoaded', () => {
					document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
				});
			}
		</script>
	</body>
</html>
